<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus | Ecossistema de Alta Performance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-color: #050508;
            --assistant-bg: rgba(15, 15, 25, 0.85);
            --user-bg: rgba(30, 30, 50, 0.7);
            --accent-cyan: #00D4FF;
            --text-main: #FFFFFF;
            --text-dim: #B0B0B0;
            --gradient-primary: linear-gradient(90deg, #00C6FF, #0072FF);
            
            /* Degradê Metálico Ultra Realista */
            --metallic-silver: linear-gradient(
                135deg, 
                #f0f0f0 0%, 
                #808080 20%, 
                #e0e0e0 40%, 
                #ffffff 50%, 
                #a0a0a0 60%, 
                #dcdcdc 80%, 
                #f0f0f0 100%
            );
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow: hidden; /* Evita scroll duplo com o chat */
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        #galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
        }

        header {
            padding: 20px 15px;
            text-align: center;
            background: rgba(5, 5, 8, 0.6);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        header h1 {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--metallic-silver);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
            animation: silver-shine 5s linear infinite;
            line-height: 1.2;
            display: inline-block;
        }

        @keyframes silver-shine {
            to { background-position: 200% center; }
        }

        header p {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            scrollbar-width: none;
            padding-bottom: 120px; /* Espaço para a barra de input */
        }

        #chat-container::-webkit-scrollbar { display: none; }

        .message {
            max-width: 88%;
            padding: 16px 20px;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease-out forwards;
            word-wrap: break-word;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .assistant {
            align-self: flex-start;
            background-color: var(--assistant-bg);
            border-radius: 4px 20px 200px 20px;
            border-left: 2px solid rgba(255,255,255,0.3);
        }

        .user {
            align-self: flex-end;
            background-color: var(--user-bg);
            border-radius: 20px 20px 4px 20px;
            border-right: 2px solid var(--accent-cyan);
            color: #fff;
        }

        /* BARRA DE INPUT RESPONSIVA */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
            padding: 20px 15px 30px 15px;
            z-index: 100;
        }

        .input-wrapper {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 30, 0.95);
            padding: 6px 6px 6px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 1rem;
            outline: none;
            min-width: 0; /* Impede o input de empurrar o botão no mobile */
        }

        button#send-btn {
            background: var(--metallic-silver);
            border: none;
            color: #000;
            height: 44px;
            padding: 0 20px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            flex-shrink: 0; /* Garante que o botão não encolha */
        }
        
        button#send-btn:active {
            transform: scale(0.95);
            filter: brightness(0.8);
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 480px) {
            header h1 { font-size: 1.2rem; }
            .message { max-width: 92%; font-size: 0.9rem; padding: 12px 16px; }
            button#send-btn { padding: 0 15px; font-size: 0.7rem; }
            .input-area { padding-bottom: 15px; }
        }

        #final-cta {
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            margin: 10px 0;
            text-align: center;
            display: none;
            backdrop-filter: blur(20px);
        }

        .cta-title { 
            font-weight: 800; 
            font-size: 1.4rem; 
            margin-bottom: 10px;
            background: var(--metallic-silver);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .benefits { text-align: left; margin: 20px 0; font-size: 0.85rem; list-style: none; display: inline-block; }
        .benefits li { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .price .old { text-decoration: line-through; color: #666; font-size: 0.8rem; }
        .price .new { color: #fff; font-weight: 800; font-size: 1.8rem; display: block; margin: 5px 0; }

        .nexus-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--gradient-primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 198, 255, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="galaxy-bg"></canvas>

    <header>
        <h1>Ecossistema Nexus</h1>
        <p>Inteligência • Estrutura • Performance</p>
    </header>

    <main id="chat-container">
        <!-- Mensagens via JS -->
    </main>

    <div id="final-cta-container" style="max-width: 600px; margin: 0 auto; width: 100%; padding: 0 15px; z-index: 10; position: relative;">
        <div id="final-cta">
            <div class="cta-title">ACESSO LIBERADO</div>
            <p style="color: #bbb; font-size: 0.8rem;">Seu novo sistema operacional de inteligência.</p>
            <ul class="benefits">
                <li><span>✅</span> <strong>I.A.s de Elite</strong> configuradas</li>
                <li><span>✅</span> <strong>Metodologia</strong> de Contexto</li>
                <li><span>✅</span> <strong>Sistemas</strong> de Organização</li>
            </ul>
            <div class="price">
                <span class="old">De R$ 97,00</span>
                <span class="new">R$ 47,00</span>
            </div>
            <a href="https://app.nexus-manual.com.br" target="_blank" class="nexus-btn">COMEÇAR AGORA 🚀</a>
        </div>
    </div>

    <div class="input-area" id="input-container">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Sua resposta..." autocomplete="off">
            <button id="send-btn">ENVIAR</button>
        </div>
    </div>

    <script>
        // --- THREE.JS GALAXY ENGINE ---
        const canvas = document.getElementById('galaxy-bg');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 4;
        camera.position.y = 1.2;
        camera.rotation.x = -0.3;

        const parameters = {
            count: 25000, // Reduzido para performance mobile
            size: 0.008,
            radius: 5,
            branches: 3,
            spin: 1,
            randomness: 0.5,
            randomnessPower: 3,
            insideColor: '#00d4ff',
            outsideColor: '#5a00ff'
        };

        let geometry, material, points;

        const generateGalaxy = () => {
            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(parameters.count * 3);
            const colors = new Float32Array(parameters.count * 3);
            const colorInside = new THREE.Color(parameters.insideColor);
            const colorOutside = new THREE.Color(parameters.outsideColor);

            for(let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;
                const radius = Math.random() * parameters.radius;
                const spinAngle = radius * parameters.spin;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;

                const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY * 0.5;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                const mixedColor = colorInside.clone();
                mixedColor.lerp(colorOutside, radius / parameters.radius);
                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            material = new THREE.PointsMaterial({
                size: parameters.size,
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        };

        generateGalaxy();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        const animate = () => {
            const elapsedTime = clock.getElapsedTime();
            points.rotation.y = elapsedTime * 0.05;
            renderer.render(scene, camera);
            window.requestAnimationFrame(animate);
        };
        animate();

        // --- CHAT LOGIC ---
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const finalCta = document.getElementById('final-cta');
        const inputContainer = document.getElementById('input-container');

        let step = 0;
        let userName = "";

        async function typeText(text, element) {
            const words = text.split(" ");
            let currentText = "";
            for (const word of words) {
                currentText += word + " ";
                element.innerHTML = currentText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                chatContainer.scrollTop = chatContainer.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 25));
            }
        }

        async function addMessage(text, role) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            chatContainer.appendChild(msgDiv);
            if (role === 'assistant') await typeText(text, msgDiv);
            else msgDiv.innerText = text;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function extrairNome(input) {
            const patterns = [/(?:nome é|sou o|sou a|me chamo)\s*([A-Za-zÀ-ÿ]+)/i, /^([A-Za-zÀ-ÿ]{3,})/i];
            for (let p of patterns) {
                const m = input.match(p);
                if (m && m[1]) return m[1].charAt(0).toUpperCase() + m[1].slice(1).toLowerCase();
            }
            return "";
        }

        function getFluxo(step) {
            const fluxos = {
                1: `Prazer, **${userName}**! Seja bem-vindo à fronteira da produtividade.\n\nNo **Nexus**, acreditamos que a I.A. veio para libertar o tempo humano.\n\nHoje, você sente que sua produtividade está limitada pela execução manual?`,
                2: `Exatamente. O **Nexus** une método e I.A. de elite.\n\nVocê prefere aprender a criar suas próprias soluções ou receber as ferramentas prontas?`,
                3: `O segredo reside na **Engenharia de Contexto**.\n\nNo Nexus, você acessa I.A.s especialistas e sistemas prontos para implementar.\n\nFaz sentido centralizar sua inteligência em um único lugar?`,
                4: `Essa centralização cria os **Arquitetos de Soluções**.\n\nPosso te mostrar o ecossistema por dentro agora?`,
                5: `Excelente. Ao entrar no Nexus, você assume o controle.\n\nEstá pronto para elevar seu nível de jogo?`,
                6: `Seja bem-vindo ao futuro, ${userName}.\n\nSeu acesso prioritário está liberado abaixo.`
            };
            return fluxos[step];
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = "";
            await addMessage(text, 'user');

            if (step === 0) {
                const nome = extrairNome(text);
                if (nome) {
                    userName = nome; step = 1;
                    await addMessage(getFluxo(1), 'assistant');
                } else {
                    await addMessage("Desculpe, como posso te chamar?", 'assistant');
                }
            } else {
                step++;
                const resp = getFluxo(step);
                if (resp) {
                    await addMessage(resp, 'assistant');
                    if (step >= 6) {
                        inputContainer.style.opacity = '0';
                        setTimeout(() => {
                            inputContainer.style.display = 'none';
                            finalCta.style.display = 'block';
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }, 800);
                    }
                }
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        window.onload = async () => {
            await new Promise(r => setTimeout(r, 800));
            await addMessage("👋 Olá! Sou o **Artheris**, o Guardião do Nexus.\n\nQual é o seu nome para começarmos?", 'assistant');
        };
    </script>
</body>
</html>
